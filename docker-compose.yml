version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aitest
      POSTGRES_PASSWORD: aitest123
      POSTGRES_DB: aitest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/init-season.sql:/docker-entrypoint-initdb.d/02-init-season.sql
      - ./db/init-sell-order.sql:/docker-entrypoint-initdb.d/03-init-sell-order.sql
      - ./db/init-bid.sql:/docker-entrypoint-initdb.d/04-init-bid.sql
      - ./db/init-checkin.sql:/docker-entrypoint-initdb.d/05-init-checkin.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitest -d aitest_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-test-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aitest_db
      - DB_USER=aitest
      - DB_PASSWORD=aitest123
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      - BLIZZARD_CLIENT_ID=${BLIZZARD_CLIENT_ID}
      - BLIZZARD_CLIENT_SECRET=${BLIZZARD_CLIENT_SECRET}
      - BLIZZARD_REDIRECT_URI=${BLIZZARD_REDIRECT_URI:-http://localhost:3000/api/auth/blizzard/callback}
      - BLIZZARD_REGION=${BLIZZARD_REGION:-kr}
    volumes:
      - ./logs:/usr/src/app/logs
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  logs:

